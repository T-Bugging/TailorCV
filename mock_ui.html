<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TailorCV - AI Resume Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 850px; margin: 40px auto; padding: 20px; background-color: #f0f2f5; line-height: 1.6; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-top: 0; font-size: 28px; border-bottom: 2px solid #e8f0fe; padding-bottom: 15px; }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #3c4043; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; resize: vertical; box-sizing: border-box; }
        textarea:focus { border-color: #1a73e8; outline: none; background-color: #f8f9fa; }
        button { background-color: #1a73e8; color: white; padding: 14px 28px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; transition: background-color 0.2s; }
        button:hover { background-color: #1765cc; }
        button:disabled { background-color: #bdc3c7; cursor: wait; }
        .loading { display: none; margin-top: 20px; padding: 15px; background-color: #fff4e5; border-left: 5px solid #ffa000; color: #663c00; font-size: 14px; border-radius: 4px; }
        #output-container { margin-top: 30px; display: none; }
        #output-container h3 { color: #1a73e8; font-size: 18px; }
        pre { background: #202124; color: #e8eaed; padding: 20px; border-radius: 8px; overflow-x: auto; font-size: 13px; border: 1px solid #3c4043; }
    </style>
</head>
<body>

<div class="container">
    <h2>TailorCV Mockup</h2>
    
    <div class="input-group">
        <label for="masterProfile">Your Professional Profile (Master Text)</label>
        <textarea id="masterProfile" placeholder="Paste your experience, education, and skills..."></textarea>
    </div>

    <div class="input-group">
        <label for="jobDescription">Target Job Description</label>
        <textarea id="jobDescription" placeholder="Paste the job requirements you are applying for..."></textarea>
    </div>

    <button id="generateBtn" onclick="generateResume()">Generate Optimized JSON</button>
    
    <div id="loadingMsg" class="loading">
        <strong>Status:</strong> Connecting to Render... <br>
        (If this is the first request in a while, it may take 30-50 seconds to wake up the server.)
    </div>

    <div id="output-container">
        <h3>AI-Optimized Result:</h3>
        <pre id="output"></pre>
    </div>
</div>

<script>
    async function generateResume() {
        const profile = document.getElementById('masterProfile').value;
        const jd = document.getElementById('jobDescription').value;
        const outputContainer = document.getElementById('output-container');
        const outputPre = document.getElementById('output');
        const loadingMsg = document.getElementById('loadingMsg');
        const btn = document.getElementById('generateBtn');

        if (!profile.trim() || !jd.trim()) {
            alert("Please provide both your profile and the job description.");
            return;
        }

        // Your specific Render URL
        const API_URL = "https://tailorcv-clqw.onrender.com/generate";

        // Setup UI for loading
        btn.disabled = true;
        btn.innerText = "Processing...";
        loadingMsg.style.display = "block";
        outputContainer.style.display = "none";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    master_profile: profile,
                    job_description: jd
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || "Server Error");
            }

            const data = await response.json();
            
            // Display JSON result
            outputPre.textContent = JSON.stringify(data, null, 2);
            outputContainer.style.display = "block";
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Oops! Something went wrong: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Optimized JSON";
            loadingMsg.style.display = "none";
        }
    }
</script>

</body>
</html>
